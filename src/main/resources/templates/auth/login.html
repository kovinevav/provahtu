<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>login</title>
    <style>
        #log {
            position: absolute;
            width: 16em;
            height: 10em;
            top: 50%;
            left: 50%;
            margin: -5em 0 0 -8em;
            text-align: center;
        }

        #log input[type="submit"] {
            color: #ffffff;
            background-color: #191919;
            width: 100%;
            height: 2em;
        }

        #log input[type="email"] {
            width: 100%;
            height: 1.5em;
        }

        #log input[type="password"] {
            width: 100%;
            height: 1.5em;
        }

        #log i {
        }
        #log img{
            height: 2em;
        }


    </style>
</head>
<body>
<div id="log">
    <form name="f" method="post" action="/process_login">
        Вход в учётную запись
        <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <br><br>
        <input type="email" id="username" name="username" value="Email">
        <br><br>
        <input type="password" id="password" name="password" value="Password">
        <br><br>


        <input type="submit" value="Войти">

        <div th:if="${param.error}" style="color: red">
            Неправильные имя или пароль
        </div>
    </form>
</div>
</body>
</html>
