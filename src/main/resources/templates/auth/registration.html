<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>login</title>
    <style>
        #log {
            position: absolute;
            width: 16em;
            height: 10em;
            top: 50%;
            left: 50%;
            margin: -5em 0 0 -8em;
            text-align: center;
        }

        #log input[type="submit"] {
            color: #ffffff;
            background-color: #191919;
            width: 100%;
            height: 2em;
        }

        #log input[type="email"] {
            width: 100%;
            height: 1.5em;
        }

        #log input[type="password"] {
            width: 100%;
            height: 1.5em;
        }

        #log i {
        }
        #log img{
            height: 2em;
        }


    </style>
</head>
<body>
<div id="log">
    <form name="f" method="post" th:action="@{/auth/registration}" th:object="${user}">
        Регистрация учётной записи
        <br><br>
        <input type="email" th:field="*{userEmail}" id="email" name="email">
        <br><br>
        <input type="password" th:field="*{password}" id="password" name="password">
        <br><br>


        <input type="submit" value="Зарегестрировать">

        <div th:if="${param.error}" style="color: red">
            Учётная запись с таким Email уже существует
        </div>
    </form>
</div>
</body>
</html>
