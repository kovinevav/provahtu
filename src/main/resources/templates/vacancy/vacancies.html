<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>vacancies</title>
    <link rel="stylesheet" href="/css/styles.css" type="text/css">
    <style>
        .top {
            height: 150px;
            background: #191919;
        }

        .center {
            width: 960px;
            margin: auto;
        }

        i {
            font-weight: bold;
            font-size:1.2em;        }    </style>
</head>
<body>
<div class="top">
    <div class="center">
        <div th:insert="auth/loginer" id="loginer"></div>
        <div th:insert="topMenu"></div>
        <div th:insert="search"></div>
    </div>
</div>


<div id="wrapper">
    <section>
        <figure>
            <h2>ВАКАНСИИ</h2>
        </figure>
        <div class="flex">
            <div th:each="vacancy: ${listVacancies}">
                <a th:href="@{/vacancy/{id}(id=${vacancy.getId_vacancy})}">
                    <div class="vacancy">
                        <H3 th:text="${vacancy.name}"></h3>
                        <br>
                        <textarea th:text="${vacancy.shortDescription}"></textarea>

                        <br>
                        <i>Зарплата: </i>
                        <i th:text="${vacancy.salary}"></i>
                        <i>  рублей</i>
                    </div>
                </a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
