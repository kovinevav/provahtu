<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>

    <meta charset="UTF-8">
    <title>Новая вакансия</title>
    <style>
        #wrapper {
            max-width: 960px;
            margin: auto;
        }

        .mytext {
            width: 50em;
            height: 2em;
            margin-bottom: 1em;
        }

        label {
            margin-top: 5px;
        }

        textarea {
            height: 30em;
            width: 50em;
        }
        section {
            margin-left: 0px;
            padding-bottom: 50px;
            padding-top: 50px;
        }
        .top {
            height: 150px;
            background: #191919;
        }
        .center{
            width: 960px;
            margin: auto;
        }
    </style>
</head>
<body>
<div class="top">
    <div class="center">
        <div th:insert="topMenu"></div>
        <div th:insert="search"></div>
    </div>
</div>
<div id="wrapper">

    <section>
        <div th:name="forma">
            <form th:action="@{/provahtu/vacancy}" th:method="POST" th:object="${vacancy}">

                <label>Название вакансии</label>
                <br>
                <input type="text" class="mytext" th:field="*{user.name}" id="matext" th:minlength="4">
                <br>
                <label for="city">Город</label>
                <br>
                <input type="text" class="mytext" th:field="*{city}" id="city">
                <br>

                <label>Описание</label>
                <br>
                <textarea th:field="*{description}"></textarea>
                <br>
                <label>Зарплата</label>
                <br>
                //<input type="text" th:field="*{salary}" hidden="От">
                <input type="text" salary_min="*{salary}" hidden="От">
                <input type="text" salary_max="*{salary}" hidden="до">
                "*{salary}" = salary_min + salary_max

                <br>
                <td><input type="submit" value="Сохранить вакансию" style="margin-top: 1em"></td>
            </form>
        </div>
    </section>
</div>
</body>
</html>
