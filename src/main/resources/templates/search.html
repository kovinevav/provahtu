<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

    <title>resumes</title>
    <style>
        button {
            background-color: #ffffff;
            border: none;
            height: 32px;
            font-family: 'Oswald', sans-serif;

        .search{
            margin-bottom: -10px;
            margin-left: -20px;
        }
        form[name="search"] {

        }

            color: #b2b2b2;

        }

    </style>
</head>
<body>

<div class="search">

    </form>




</div>

</body>
</html>
